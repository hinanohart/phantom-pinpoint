name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff + mypy on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyarrow seaborn
      - name: Lint with ruff
        run: ruff check src tests experiments
      - name: Type-check with mypy
        run: mypy src/phantom_pinpoint
        continue-on-error: true   # mypy strict is best-effort while v0.1.0
      - name: Run tests with coverage
        run: pytest --cov=src/phantom_pinpoint --cov-report=xml --cov-fail-under=75
      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
